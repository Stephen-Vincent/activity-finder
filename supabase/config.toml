# Supabase local dev config.
# Generated by `supabase init` and committed to source. Edit values that affect
# local dev only — production settings live in the Supabase dashboard.

project_id = "activity-finder"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "activityfinder://"
additional_redirect_urls = ["activityfinder://auth-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# OAuth providers — keys live in .env, referenced here.
[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[functions]
verify_jwt = true
