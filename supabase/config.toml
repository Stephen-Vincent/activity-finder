# Supabase local dev config.
# Generated by `supabase init` and committed to source. Edit values that affect
# local dev only — production settings live in the Supabase dashboard.

project_id = "activity-finder"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "activityfinder://"
# Supabase only redirects magic-link emails to URLs on this list (plus site_url).
# In production builds the redirect lands on `activityfinder://auth/callback`.
# In dev with Expo Go the same call returns `exp://<lan-ip>:8081/--/auth/callback`,
# so we allow the `exp://**` glob too. Tighten this for production later.
additional_redirect_urls = [
  "activityfinder://auth/callback",
  "exp://**",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
# Recent Supabase CLI versions ship a short default OTP expiry (~60s) which
# is fine for SMS but a pain for email — by the time you switch to your inbox,
# read the code, and type it in, it's already expired. 600 seconds (10 min)
# is a reasonable balance for email OTPs in dev. Tighten in prod if you like.
otp_expiry = 600

# We use the 6-digit OTP code flow rather than magic links — the user gets the
# code by email and types it into the app. This template renders the code
# prominently. Supabase calls the file "magic_link" regardless of whether it
# carries a link or a code.
[auth.email.template.magic_link]
subject = "Your Activity Finder sign-in code"
# Path is resolved relative to where the `supabase` CLI is run, which is the
# project root via the `npm run supabase:*` proxy scripts — so we prefix with
# `supabase/`. Don't use `./` here; the CLI strips it and you get a confusing
# "no such file" error.
content_path = "supabase/templates/magic_link.html"

# OAuth providers — keys live in .env, referenced here.
[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

# Edge Functions. Each function gets its own block named after its folder
# under supabase/functions/. verify_jwt = true rejects unauthenticated calls
# at the gateway; turn it off for webhooks and public redirects.

[functions.stripe-webhook]
# Stripe signs webhooks with Stripe-Signature, not a Supabase JWT.
# The function itself verifies the signature in code.
verify_jwt = false

[functions.booking-redirect]
# Anonymous parents may follow affiliate links before signing in.
verify_jwt = false

[functions.daily-digest]
# Triggered by the scheduler, not a user.
verify_jwt = false

[functions.create-subscription]
# Called by the mobile app on behalf of an authenticated user — keep auth on.
verify_jwt = true
